schema:
  - https://git.elabnext.com/api/graphql:
      headers:
        Authorization: Bearer glpat-TODO
documents:
  - src/graphql/**/*.graphql
generates:
  src/generated/gitlab-sdk.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
    config:
      # maybeValue: T | null
      avoidOptionals: true
      skipTypename: true
      dedupeOperationSuffix: true
      enumsAsTypes: true
      useTypeImports: true
      scalars:
        Time: string
        Date: string
        ID: string

