query ProjectMRs($projectPath: ID!, $state: MergeRequestState, $first: Int!) {
  project(fullPath: $projectPath) {
    id
    name
    path
    fullPath
    mergeRequests(state: $state, first: $first, sort: UPDATED_DESC) {
      count
      pageInfo {
        hasNextPage
      }
      nodes {
        ...MergeRequestFields
      }
    }
  }
}